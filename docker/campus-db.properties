# Docker 内使用（由 Dockerfile 打入 WAR，覆盖 classpath 下 db.properties）
jdbc.driver=com.mysql.cj.jdbc.Driver
# 与本地 db.properties 一致：UTF-8 + utf8mb4 排序规则，否则中文（如分类名）在 Docker/MySQL8 下易乱码
jdbc.url=jdbc:mysql://mysql:3306/secondhand_market?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
jdbc.username=root
jdbc.password=campus_root
upload.path=/data/upload/
